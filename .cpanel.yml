---
deployment:
  tasks:
    - export DEPLOYPATH=/home/dscx7887/public_html/nobar

    - /bin/mkdir -p $DEPLOYPATH

    - /bin/cp public/index.php $DEPLOYPATH
    - /bin/cp public/.htaccess $DEPLOYPATH

    - /bin/cp -R public/build $DEPLOYPATH
    - /bin/cp -R public/storage $DEPLOYPATH

    - /bin/cp public/favicon.ico $DEPLOYPATH || true
    - /bin/cp public/robots.txt $DEPLOYPATH || true
    - /bin/cp public/logo.jpeg $DEPLOYPATH || true